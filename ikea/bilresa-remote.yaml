mode: queued
max: 10
blueprint:
  name: IKEA BILRESA Dimmer with Light Groups
  author: ACasset
  description: |
    # IKEA BILRESA Dimmer with Light Groups

    ## Features

    Blueprint for IKEA BILRESA scroll wheel dimmer with preset brightness levels for 3 light groups.

    ### Dimmer Behavior (per group)

    * **Long press**: Turn off lights
    * **Single click**: Turn on lights at brightness level 1
    * **Double click**: Turn on lights at brightness level 2
    * **Triple click**: Turn on lights at brightness level 3
    * **Scroll wheel right**: Increase brightness by configurable step %
    * **Scroll wheel left**: Decrease brightness by configurable step %

    ### Optional Remote

    * **Single press**: Turn on all light groups
    * **Long press**: Turn off all light groups

  domain: automation
  homeassistant:
    min_version: 2025.12.0

  input:
    dimmer_setup:
      name: ⚙️ Dimmer Setup
      description: >
        Select the 3 IKEA BILRESA dimmer devices (one per group).
      collapsed: false
      input:
        group1_device:
          name: Group 1 - Dimmer Device
          description: >
            Select the IKEA BILRESA dimmer device used for group 1.
          selector: &bilresa_device_selector
            device:
              filter:
                manufacturer: IKEA
                model: BILRESA

        group2_device:
          name: Group 2 - Dimmer Device
          description: >
            Select the IKEA BILRESA dimmer device used for group 2.
          selector: *bilresa_device_selector

        group3_device:
          name: Group 3 - Dimmer Device
          description: >
            Select the IKEA BILRESA dimmer device used for group 3.
          selector: *bilresa_device_selector

    lights_setup:
      name: 💡 Light Groups
      description: >
        Select lights or light groups for each dimmer group.
      collapsed: false
      input:
        group1_lights:
          name: Group 1 - Lights
          description: >
            Select lights or light groups for group 1.
          selector:
            target:
              entity:
                domain: light

        group2_lights:
          name: Group 2 - Lights
          description: >
            Select lights or light groups for group 2.
          selector:
            target:
              entity:
                domain: light

        group3_lights:
          name: Group 3 - Lights
          description: >
            Select lights or light groups for group 3.
          selector:
            target:
              entity:
                domain: light

    brightness_setup:
      name: 🔆 Brightness Levels
      description: >
        Define the 3 brightness percentages for single, double, and triple click,
        and the scroll wheel step.
      collapsed: false
      input:
        brightness_1:
          name: Brightness Level 1 (single click)
          description: Brightness percentage applied on single click.
          default: 30
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider

        brightness_2:
          name: Brightness Level 2 (double click)
          description: Brightness percentage applied on double click.
          default: 60
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider

        brightness_3:
          name: Brightness Level 3 (triple click)
          description: Brightness percentage applied on triple click.
          default: 100
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider

        scroll_step:
          name: Scroll Wheel Step
          description: >
            Brightness percentage change per scroll wheel tick.
            Scroll right increases, scroll left decreases.
          default: 5
          selector:
            number:
              min: 1
              max: 25
              step: 1
              unit_of_measurement: "%"
              mode: slider

    remote_setup:
      name: 🎮 Optional Remote
      description: >
        Optionally select a remote to turn on/off all light groups at once.
      collapsed: true
      input:
        remote_device:
          name: Remote - Device (optional)
          description: >
            Select an optional IKEA BILRESA device.
            Single press turns on all lights, long press turns off all lights.
            Leave empty if not using a remote.
          default: ""
          selector:
            device:
              filter:
                manufacturer: IKEA
                model: BILRESA

trigger_variables:
  var_group1_device: !input group1_device
  var_group2_device: !input group2_device
  var_group3_device: !input group3_device
  var_remote_device: !input remote_device

  # BILRESA numbering pattern: group 1 => right=1 left=2 button=3,
  # group 2 => right=4 left=5 button=6, group 3 => right=7 left=8 button=9.
  var_button1_event: >-
    {{ device_entities(var_group1_device)
       | select('match', '^event\.[a-z0-9_]+_3(?:$|_.*$)')
       | list
       | first
       | default('event.invalid_group1_button') }}
  var_scroll1_left_event: >-
    {{ device_entities(var_group1_device)
       | select('match', '^event\.[a-z0-9_]+_2(?:$|_.*$)')
       | list
       | first
       | default('event.invalid_group1_scroll_left') }}
  var_scroll1_right_event: >-
    {{ device_entities(var_group1_device)
       | select('match', '^event\.[a-z0-9_]+_1(?:$|_.*$)')
       | list
       | first
       | default('event.invalid_group1_scroll_right') }}

  var_button2_event: >-
    {{ device_entities(var_group2_device)
       | select('match', '^event\.[a-z0-9_]+_6(?:$|_.*$)')
       | list
       | first
       | default('event.invalid_group2_button') }}
  var_scroll2_left_event: >-
    {{ device_entities(var_group2_device)
       | select('match', '^event\.[a-z0-9_]+_5(?:$|_.*$)')
       | list
       | first
       | default('event.invalid_group2_scroll_left') }}
  var_scroll2_right_event: >-
    {{ device_entities(var_group2_device)
       | select('match', '^event\.[a-z0-9_]+_4(?:$|_.*$)')
       | list
       | first
       | default('event.invalid_group2_scroll_right') }}

  var_button3_event: >-
    {{ device_entities(var_group3_device)
       | select('match', '^event\.[a-z0-9_]+_9(?:$|_.*$)')
       | list
       | first
       | default('event.invalid_group3_button') }}
  var_scroll3_left_event: >-
    {{ device_entities(var_group3_device)
       | select('match', '^event\.[a-z0-9_]+_8(?:$|_.*$)')
       | list
       | first
       | default('event.invalid_group3_scroll_left') }}
  var_scroll3_right_event: >-
    {{ device_entities(var_group3_device)
       | select('match', '^event\.[a-z0-9_]+_7(?:$|_.*$)')
       | list
       | first
       | default('event.invalid_group3_scroll_right') }}

  var_remote_event: >-
    {% if var_remote_device %}
      {{ device_entities(var_remote_device)
         | select('match', '^event\.[a-z0-9_]+_3(?:$|_.*$)')
         | list
         | first
         | default('') }}
    {% endif %}

# ===================================================================
# TRIGGERS
# ===================================================================

trigger:
  # Dimmer buttons (required)
  - platform: state
    id: button1
    entity_id: "{{ var_button1_event | trim }}"
  - platform: state
    id: button2
    entity_id: "{{ var_button2_event | trim }}"
  - platform: state
    id: button3
    entity_id: "{{ var_button3_event | trim }}"
  # Scroll wheel events (required)
  - platform: state
    id: scroll1_left
    entity_id: "{{ var_scroll1_left_event | trim }}"
  - platform: state
    id: scroll1_right
    entity_id: "{{ var_scroll1_right_event | trim }}"
  - platform: state
    id: scroll2_left
    entity_id: "{{ var_scroll2_left_event | trim }}"
  - platform: state
    id: scroll2_right
    entity_id: "{{ var_scroll2_right_event | trim }}"
  - platform: state
    id: scroll3_left
    entity_id: "{{ var_scroll3_left_event | trim }}"
  - platform: state
    id: scroll3_right
    entity_id: "{{ var_scroll3_right_event | trim }}"
  # Optional remote (uses state_changed event to safely handle empty entity)
  - platform: event
    id: remote
    event_type: state_changed
    event_data:
      entity_id: "{{ var_remote_event | trim }}"

# ===================================================================
# CONDITIONS
# ===================================================================

condition:
  - condition: template
    value_template: >
      {% if trigger.platform == 'state' %}
        {{ trigger.from_state.state not in ['unknown', 'unavailable'] and
           trigger.to_state.state not in ['unknown', 'unavailable'] and
           trigger.from_state.state != trigger.to_state.state }}
      {% else %}
        true
      {% endif %}

# ===================================================================
# ACTIONS
# ===================================================================

action:
  - variables:
      trigger_id: "{{ trigger.id }}"
      press_type: >-
        {% if trigger.platform == 'state' %}
          {{ trigger.to_state.attributes.event_type }}
        {% elif trigger.platform == 'event' %}
          {% set ns = trigger.event.data.new_state if trigger.event and trigger.event.data is defined else none %}
          {{ ns.attributes.event_type | default('') if ns is not none else '' }}
        {% else %}
          {{ '' }}
        {% endif %}
      scroll_step_pct: !input scroll_step

  - choose:
      # =============================================
      # Group 1 - Dimmer Actions
      # =============================================
      - conditions:
          - condition: template
            value_template: "{{ trigger_id == 'button1' and press_type == 'multi_press_1' }}"
        sequence:
          - action: light.turn_on
            target: !input group1_lights
            data:
              brightness_pct: !input brightness_1

      - conditions:
          - condition: template
            value_template: "{{ trigger_id == 'button1' and press_type == 'multi_press_2' }}"
        sequence:
          - action: light.turn_on
            target: !input group1_lights
            data:
              brightness_pct: !input brightness_2

      - conditions:
          - condition: template
            value_template: "{{ trigger_id == 'button1' and press_type == 'multi_press_3' }}"
        sequence:
          - action: light.turn_on
            target: !input group1_lights
            data:
              brightness_pct: !input brightness_3

      - conditions:
          - condition: template
            value_template: "{{ trigger_id == 'button1' and press_type == 'long_press' }}"
        sequence:
          - action: light.turn_off
            target: !input group1_lights

      # =============================================
      # Group 1 - Scroll Wheel
      # =============================================
      - conditions:
          - condition: template
            value_template: "{{ trigger_id == 'scroll1_right' }}"
        sequence:
          - action: light.turn_on
            target: !input group1_lights
            data:
              brightness_step_pct: "{{ scroll_step_pct | int }}"

      - conditions:
          - condition: template
            value_template: "{{ trigger_id == 'scroll1_left' }}"
        sequence:
          - action: light.turn_on
            target: !input group1_lights
            data:
              brightness_step_pct: "{{ -1 * (scroll_step_pct | int) }}"

      # =============================================
      # Group 2 - Dimmer Actions
      # =============================================
      - conditions:
          - condition: template
            value_template: "{{ trigger_id == 'button2' and press_type == 'multi_press_1' }}"
        sequence:
          - action: light.turn_on
            target: !input group2_lights
            data:
              brightness_pct: !input brightness_1

      - conditions:
          - condition: template
            value_template: "{{ trigger_id == 'button2' and press_type == 'multi_press_2' }}"
        sequence:
          - action: light.turn_on
            target: !input group2_lights
            data:
              brightness_pct: !input brightness_2

      - conditions:
          - condition: template
            value_template: "{{ trigger_id == 'button2' and press_type == 'multi_press_3' }}"
        sequence:
          - action: light.turn_on
            target: !input group2_lights
            data:
              brightness_pct: !input brightness_3

      - conditions:
          - condition: template
            value_template: "{{ trigger_id == 'button2' and press_type == 'long_press' }}"
        sequence:
          - action: light.turn_off
            target: !input group2_lights

      # =============================================
      # Group 2 - Scroll Wheel
      # =============================================
      - conditions:
          - condition: template
            value_template: "{{ trigger_id == 'scroll2_right' }}"
        sequence:
          - action: light.turn_on
            target: !input group2_lights
            data:
              brightness_step_pct: "{{ scroll_step_pct | int }}"

      - conditions:
          - condition: template
            value_template: "{{ trigger_id == 'scroll2_left' }}"
        sequence:
          - action: light.turn_on
            target: !input group2_lights
            data:
              brightness_step_pct: "{{ -1 * (scroll_step_pct | int) }}"

      # =============================================
      # Group 3 - Dimmer Actions
      # =============================================
      - conditions:
          - condition: template
            value_template: "{{ trigger_id == 'button3' and press_type == 'multi_press_1' }}"
        sequence:
          - action: light.turn_on
            target: !input group3_lights
            data:
              brightness_pct: !input brightness_1

      - conditions:
          - condition: template
            value_template: "{{ trigger_id == 'button3' and press_type == 'multi_press_2' }}"
        sequence:
          - action: light.turn_on
            target: !input group3_lights
            data:
              brightness_pct: !input brightness_2

      - conditions:
          - condition: template
            value_template: "{{ trigger_id == 'button3' and press_type == 'multi_press_3' }}"
        sequence:
          - action: light.turn_on
            target: !input group3_lights
            data:
              brightness_pct: !input brightness_3

      - conditions:
          - condition: template
            value_template: "{{ trigger_id == 'button3' and press_type == 'long_press' }}"
        sequence:
          - action: light.turn_off
            target: !input group3_lights

      # =============================================
      # Group 3 - Scroll Wheel
      # =============================================
      - conditions:
          - condition: template
            value_template: "{{ trigger_id == 'scroll3_right' }}"
        sequence:
          - action: light.turn_on
            target: !input group3_lights
            data:
              brightness_step_pct: "{{ scroll_step_pct | int }}"

      - conditions:
          - condition: template
            value_template: "{{ trigger_id == 'scroll3_left' }}"
        sequence:
          - action: light.turn_on
            target: !input group3_lights
            data:
              brightness_step_pct: "{{ -1 * (scroll_step_pct | int) }}"

      # =============================================
      # Optional Remote - Turn On All Groups
      # =============================================
      - conditions:
          - condition: template
            value_template: "{{ trigger_id == 'remote' and press_type == 'multi_press_1' }}"
        sequence:
          - parallel:
              - action: light.turn_on
                target: !input group1_lights
              - action: light.turn_on
                target: !input group2_lights
              - action: light.turn_on
                target: !input group3_lights

      # =============================================
      # Optional Remote - Turn Off All Groups
      # =============================================
      - conditions:
          - condition: template
            value_template: "{{ trigger_id == 'remote' and press_type == 'long_press' }}"
        sequence:
          - parallel:
              - action: light.turn_off
                target: !input group1_lights
              - action: light.turn_off
                target: !input group2_lights
              - action: light.turn_off
                target: !input group3_lights
