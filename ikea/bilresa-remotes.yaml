mode: queued
max: 10
blueprint:
  name: IKEA BILRESA-remotes
  author: ACasset
  description: |
    # IKEA BILRESA-remotes

    ## Features

    Blueprint for IKEA BILRESA scroll wheel dimmer with preset brightness levels for 3 light groups.

    ### Dimmer Behavior (per group)

    * **Long press**: Turn off lights
    * **Single click**: Turn on lights at brightness level 1
    * **Double click**: Turn on lights at brightness level 2
    * **Triple click**: Turn on lights at brightness level 3
    * **Dimmer clicks transition**: Configurable transition time (default 2s)
    * **Scroll wheel right**: Increase brightness by configurable step %
    * **Scroll wheel left**: Decrease brightness by configurable step %
    * **Scroll wheel mode**: Instant-like handling (one step when event state is `1`)

    ### Optional Remote

    * **Top button**: 1/2/3 clicks turn on all light groups at brightness level 1/2/3
    * **Bottom button**: Single click turns off all light groups
    * **Remote clicks transition**: Uses same configurable transition time

  domain: automation
  homeassistant:
    min_version: 2025.12.0

  input:
    dimmer_setup:
      name: ⚙️ Dimmer Setup
      description: >
        Select one IKEA BILRESA scroll wheel device.
        Channels 1, 2 and 3 are automatically mapped from this device.
      collapsed: false
      input:
        scroll_wheel_device:
          name: Scroll Wheel Device
          description: >
            Select one IKEA BILRESA scroll wheel device.
            The blueprint automatically maps groups 1/2/3 to channels 1/2/3.
          selector:
            device:
              filter:
                manufacturer: IKEA of Sweden
                model: BILRESA scroll wheel

    lights_setup:
      name: 💡 Light Groups
      description: >
        Select lights or light groups for each dimmer group.
      collapsed: false
      input:
        group1_lights:
          name: Group 1 - Lights
          description: >
            Select lights or light groups for group 1.
          selector:
            target:
              entity:
                domain: light

        group2_lights:
          name: Group 2 - Lights
          description: >
            Select lights or light groups for group 2 (optional).
            Leave empty if not used.
          default: {}
          selector:
            target:
              entity:
                domain: light

        group3_lights:
          name: Group 3 - Lights
          description: >
            Select lights or light groups for group 3 (optional).
            Leave empty if not used.
          default: {}
          selector:
            target:
              entity:
                domain: light

    brightness_setup:
      name: 🔆 Brightness Levels
      description: >
        Define the 3 brightness percentages for single, double, and triple click,
        and the scroll wheel step.
      collapsed: false
      input:
        brightness_1:
          name: Brightness Level 1 (single click)
          description: Brightness percentage applied on single click.
          default: 30
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider

        brightness_2:
          name: Brightness Level 2 (double click)
          description: Brightness percentage applied on double click.
          default: 60
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider

        brightness_3:
          name: Brightness Level 3 (triple click)
          description: Brightness percentage applied on triple click.
          default: 100
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider

        scroll_step:
          name: Scroll Wheel Step
          description: >
            Brightness percentage change per scroll wheel tick.
            Scroll right increases, scroll left decreases.
          default: 5
          selector:
            number:
              min: 1
              max: 25
              step: 1
              unit_of_measurement: "%"
              mode: slider

        click_transition_s:
          name: Click Transition (seconds)
          description: >
            Transition time used for dimmer and remote click actions.
          default: 2
          selector:
            number:
              min: 0
              max: 10
              step: 0.1
              unit_of_measurement: "s"
              mode: slider

    remote_setup:
      name: 🎮 Optional Remote
      description: >
        Optionally select a remote to turn on/off all light groups at once.
      collapsed: true
      input:
        remote_device:
          name: Remote - Device (optional)
          description: >
            Select an optional IKEA BILRESA device.
            Top button (1/2/3 clicks) turns on all lights with brightness level 1/2/3.
            Bottom button (single click) turns off all lights.
            Leave empty if not using a remote.
          default: ""
          selector:
            device:
              filter:
                manufacturer: IKEA of Sweden
                model: BILRESA dual button

trigger_variables:
  var_scroll_wheel_device: !input scroll_wheel_device
  var_remote_device: !input remote_device

  # BILRESA numbering pattern: group 1 => right=1 left=2 button=3,
  # group 2 => right=4 left=5 button=6, group 3 => right=7 left=8 button=9.
  var_button1_event: >-
    {{ device_entities(var_scroll_wheel_device)
       | select('match', '^event\.[a-z0-9_]+_3(?:$|_.*$)')
       | list
       | first
       | default('event.invalid_group1_button') }}
  var_scroll1_left_event: >-
    {{ device_entities(var_scroll_wheel_device)
       | select('match', '^event\.[a-z0-9_]+_2(?:$|_.*$)')
       | list
       | first
       | default('event.invalid_group1_scroll_left') }}
  var_scroll1_right_event: >-
    {{ device_entities(var_scroll_wheel_device)
       | select('match', '^event\.[a-z0-9_]+_1(?:$|_.*$)')
       | list
       | first
       | default('event.invalid_group1_scroll_right') }}

  var_button2_event: >-
    {{ device_entities(var_scroll_wheel_device)
       | select('match', '^event\.[a-z0-9_]+_6(?:$|_.*$)')
       | list
       | first
       | default('event.invalid_group2_button') }}
  var_scroll2_left_event: >-
    {{ device_entities(var_scroll_wheel_device)
       | select('match', '^event\.[a-z0-9_]+_5(?:$|_.*$)')
       | list
       | first
       | default('event.invalid_group2_scroll_left') }}
  var_scroll2_right_event: >-
    {{ device_entities(var_scroll_wheel_device)
       | select('match', '^event\.[a-z0-9_]+_4(?:$|_.*$)')
       | list
       | first
       | default('event.invalid_group2_scroll_right') }}

  var_button3_event: >-
    {{ device_entities(var_scroll_wheel_device)
       | select('match', '^event\.[a-z0-9_]+_9(?:$|_.*$)')
       | list
       | first
       | default('event.invalid_group3_button') }}
  var_scroll3_left_event: >-
    {{ device_entities(var_scroll_wheel_device)
       | select('match', '^event\.[a-z0-9_]+_8(?:$|_.*$)')
       | list
       | first
       | default('event.invalid_group3_scroll_left') }}
  var_scroll3_right_event: >-
    {{ device_entities(var_scroll_wheel_device)
       | select('match', '^event\.[a-z0-9_]+_7(?:$|_.*$)')
       | list
       | first
       | default('event.invalid_group3_scroll_right') }}

  # BILRESA dual-button numbering pattern in event entity suffixes:
  # top button => ..._1, bottom button => ..._2.
  var_remote_top_event: >-
    {% if var_remote_device %}
      {{ device_entities(var_remote_device)
         | select('match', '^event\.[a-z0-9_]+_1(?:$|_.*$)')
         | list
         | first
         | default('') }}
    {% endif %}

  var_remote_bottom_event: >-
    {% if var_remote_device %}
      {{ device_entities(var_remote_device)
         | select('match', '^event\.[a-z0-9_]+_2(?:$|_.*$)')
         | list
         | first
         | default('') }}
    {% endif %}

# ===================================================================
# TRIGGERS
# ===================================================================

trigger:
  # Dimmer buttons (required)
  - platform: event
    id: button1
    event_type: state_changed
    event_data:
      entity_id: "{{ var_button1_event | trim }}"
  - platform: event
    id: button2
    event_type: state_changed
    event_data:
      entity_id: "{{ var_button2_event | trim }}"
  - platform: event
    id: button3
    event_type: state_changed
    event_data:
      entity_id: "{{ var_button3_event | trim }}"
  # Scroll wheel events (required)
  - platform: event
    id: scroll1_left
    event_type: state_changed
    event_data:
      entity_id: "{{ var_scroll1_left_event | trim }}"
  - platform: event
    id: scroll1_right
    event_type: state_changed
    event_data:
      entity_id: "{{ var_scroll1_right_event | trim }}"
  - platform: event
    id: scroll2_left
    event_type: state_changed
    event_data:
      entity_id: "{{ var_scroll2_left_event | trim }}"
  - platform: event
    id: scroll2_right
    event_type: state_changed
    event_data:
      entity_id: "{{ var_scroll2_right_event | trim }}"
  - platform: event
    id: scroll3_left
    event_type: state_changed
    event_data:
      entity_id: "{{ var_scroll3_left_event | trim }}"
  - platform: event
    id: scroll3_right
    event_type: state_changed
    event_data:
      entity_id: "{{ var_scroll3_right_event | trim }}"
  # Optional remote (uses state_changed event to safely handle empty entity)
  - platform: event
    id: remote_top
    event_type: state_changed
    event_data:
      entity_id: "{{ var_remote_top_event | trim }}"
  - platform: event
    id: remote_bottom
    event_type: state_changed
    event_data:
      entity_id: "{{ var_remote_bottom_event | trim }}"

# ===================================================================
# CONDITIONS
# ===================================================================

condition:
  - condition: template
    value_template: >
      {% set old_state = trigger.event.data.old_state if trigger.event and trigger.event.data is defined else none %}
      {% set new_state = trigger.event.data.new_state if trigger.event and trigger.event.data is defined else none %}
      {{ old_state is not none and
         new_state is not none and
         old_state.state not in ['unknown', 'unavailable'] and
         new_state.state not in ['unknown', 'unavailable'] and
         old_state.state != new_state.state }}

# ===================================================================
# ACTIONS
# ===================================================================

action:
  - variables:
      trigger_id: "{{ trigger.id }}"
      group2_target: !input group2_lights
      group3_target: !input group3_lights
      brightness_level_1: !input brightness_1
      brightness_level_2: !input brightness_2
      brightness_level_3: !input brightness_3
      press_type: >-
        {% set ns = trigger.event.data.new_state if trigger.event and trigger.event.data is defined else none %}
        {{ ns.attributes.event_type | default('') if ns is not none else '' }}
      new_state_value: >-
        {% set ns = trigger.event.data.new_state if trigger.event and trigger.event.data is defined else none %}
        {{ ns.state | default('') if ns is not none else '' }}
      scroll_step_pct: !input scroll_step
      click_transition_s: !input click_transition_s

  - choose:
      # =============================================
      # Group 1 - Dimmer Actions
      # =============================================
      - conditions:
          - condition: template
            value_template: "{{ trigger_id == 'button1' and press_type == 'multi_press_1' }}"
        sequence:
          - action: light.turn_on
            target: !input group1_lights
            data:
              brightness_pct: !input brightness_1
              transition: "{{ click_transition_s | float(2) }}"

      - conditions:
          - condition: template
            value_template: "{{ trigger_id == 'button1' and press_type == 'multi_press_2' }}"
        sequence:
          - action: light.turn_on
            target: !input group1_lights
            data:
              brightness_pct: !input brightness_2
              transition: "{{ click_transition_s | float(2) }}"

      - conditions:
          - condition: template
            value_template: "{{ trigger_id == 'button1' and press_type == 'multi_press_3' }}"
        sequence:
          - action: light.turn_on
            target: !input group1_lights
            data:
              brightness_pct: !input brightness_3
              transition: "{{ click_transition_s | float(2) }}"

      - conditions:
          - condition: template
            value_template: "{{ trigger_id == 'button1' and press_type == 'long_press' }}"
        sequence:
          - action: light.turn_off
            target: !input group1_lights

      # =============================================
      # Group 1 - Scroll Wheel
      # =============================================
      - conditions:
          - condition: template
            value_template: "{{ trigger_id == 'scroll1_right' and new_state_value == '1' }}"
        sequence:
          - action: light.turn_on
            target: !input group1_lights
            data:
              brightness_step_pct: "{{ scroll_step_pct | int }}"

      - conditions:
          - condition: template
            value_template: "{{ trigger_id == 'scroll1_left' and new_state_value == '1' }}"
        sequence:
          - action: light.turn_on
            target: !input group1_lights
            data:
              brightness_step_pct: "{{ -1 * (scroll_step_pct | int) }}"

      # =============================================
      # Group 2 - Dimmer Actions
      # =============================================
      - conditions:
          - condition: template
            value_template: "{{ group2_target | length > 0 and trigger_id == 'button2' and press_type == 'multi_press_1' }}"
        sequence:
          - action: light.turn_on
            target: !input group2_lights
            data:
              brightness_pct: !input brightness_1
              transition: "{{ click_transition_s | float(2) }}"

      - conditions:
          - condition: template
            value_template: "{{ group2_target | length > 0 and trigger_id == 'button2' and press_type == 'multi_press_2' }}"
        sequence:
          - action: light.turn_on
            target: !input group2_lights
            data:
              brightness_pct: !input brightness_2
              transition: "{{ click_transition_s | float(2) }}"

      - conditions:
          - condition: template
            value_template: "{{ group2_target | length > 0 and trigger_id == 'button2' and press_type == 'multi_press_3' }}"
        sequence:
          - action: light.turn_on
            target: !input group2_lights
            data:
              brightness_pct: !input brightness_3
              transition: "{{ click_transition_s | float(2) }}"

      - conditions:
          - condition: template
            value_template: "{{ group2_target | length > 0 and trigger_id == 'button2' and press_type == 'long_press' }}"
        sequence:
          - action: light.turn_off
            target: !input group2_lights

      # =============================================
      # Group 2 - Scroll Wheel
      # =============================================
      - conditions:
          - condition: template
            value_template: "{{ group2_target | length > 0 and trigger_id == 'scroll2_right' and new_state_value == '1' }}"
        sequence:
          - action: light.turn_on
            target: !input group2_lights
            data:
              brightness_step_pct: "{{ scroll_step_pct | int }}"

      - conditions:
          - condition: template
            value_template: "{{ group2_target | length > 0 and trigger_id == 'scroll2_left' and new_state_value == '1' }}"
        sequence:
          - action: light.turn_on
            target: !input group2_lights
            data:
              brightness_step_pct: "{{ -1 * (scroll_step_pct | int) }}"

      # =============================================
      # Group 3 - Dimmer Actions
      # =============================================
      - conditions:
          - condition: template
            value_template: "{{ group3_target | length > 0 and trigger_id == 'button3' and press_type == 'multi_press_1' }}"
        sequence:
          - action: light.turn_on
            target: !input group3_lights
            data:
              brightness_pct: !input brightness_1
              transition: "{{ click_transition_s | float(2) }}"

      - conditions:
          - condition: template
            value_template: "{{ group3_target | length > 0 and trigger_id == 'button3' and press_type == 'multi_press_2' }}"
        sequence:
          - action: light.turn_on
            target: !input group3_lights
            data:
              brightness_pct: !input brightness_2
              transition: "{{ click_transition_s | float(2) }}"

      - conditions:
          - condition: template
            value_template: "{{ group3_target | length > 0 and trigger_id == 'button3' and press_type == 'multi_press_3' }}"
        sequence:
          - action: light.turn_on
            target: !input group3_lights
            data:
              brightness_pct: !input brightness_3
              transition: "{{ click_transition_s | float(2) }}"

      - conditions:
          - condition: template
            value_template: "{{ group3_target | length > 0 and trigger_id == 'button3' and press_type == 'long_press' }}"
        sequence:
          - action: light.turn_off
            target: !input group3_lights

      # =============================================
      # Group 3 - Scroll Wheel
      # =============================================
      - conditions:
          - condition: template
            value_template: "{{ group3_target | length > 0 and trigger_id == 'scroll3_right' and new_state_value == '1' }}"
        sequence:
          - action: light.turn_on
            target: !input group3_lights
            data:
              brightness_step_pct: "{{ scroll_step_pct | int }}"

      - conditions:
          - condition: template
            value_template: "{{ group3_target | length > 0 and trigger_id == 'scroll3_left' and new_state_value == '1' }}"
        sequence:
          - action: light.turn_on
            target: !input group3_lights
            data:
              brightness_step_pct: "{{ -1 * (scroll_step_pct | int) }}"

      # =============================================
      # Optional Remote Top Button - Turn On All Groups
      # =============================================
      - conditions:
          - condition: template
            value_template: "{{ trigger_id == 'remote_top' and press_type in ['multi_press_1', 'multi_press_2', 'multi_press_3'] }}"
        sequence:
          - variables:
              remote_top_brightness_pct: >-
                {% if press_type == 'multi_press_1' %}
                  {{ brightness_level_1 }}
                {% elif press_type == 'multi_press_2' %}
                  {{ brightness_level_2 }}
                {% else %}
                  {{ brightness_level_3 }}
                {% endif %}
          - action: light.turn_on
            target: !input group1_lights
            data:
              brightness_pct: "{{ remote_top_brightness_pct | int }}"
              transition: "{{ click_transition_s | float(2) }}"
          - if:
              - condition: template
                value_template: "{{ group2_target | length > 0 }}"
            then:
              - action: light.turn_on
                target: !input group2_lights
                data:
                  brightness_pct: "{{ remote_top_brightness_pct | int }}"
                  transition: "{{ click_transition_s | float(2) }}"
          - if:
              - condition: template
                value_template: "{{ group3_target | length > 0 }}"
            then:
              - action: light.turn_on
                target: !input group3_lights
                data:
                  brightness_pct: "{{ remote_top_brightness_pct | int }}"
                  transition: "{{ click_transition_s | float(2) }}"

      # =============================================
      # Optional Remote Bottom Button - Turn Off All Groups
      # =============================================
      - conditions:
          - condition: template
            value_template: "{{ trigger_id == 'remote_bottom' and press_type == 'multi_press_1' }}"
        sequence:
          - action: light.turn_off
            target: !input group1_lights
            data:
              transition: "{{ click_transition_s | float(2) }}"
          - if:
              - condition: template
                value_template: "{{ group2_target | length > 0 }}"
            then:
              - action: light.turn_off
                target: !input group2_lights
                data:
                  transition: "{{ click_transition_s | float(2) }}"
          - if:
              - condition: template
                value_template: "{{ group3_target | length > 0 }}"
            then:
              - action: light.turn_off
                target: !input group3_lights
                data:
                  transition: "{{ click_transition_s | float(2) }}"
